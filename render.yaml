services:
  # ── Backend Django API ──────────────────────────────
  - type: web
    name: gestion-etudiants-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn gestion_etudiants.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "gestion-etudiants-api.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://gestion-etudiants-front.onrender.com"
      - key: DB_NAME
        value: gestion_etudiants_db
      - key: DB_USER
        value: gestion_etudiants_db_user
      - key: DB_PASSWORD
        sync: false   # à renseigner manuellement dans le dashboard Render
      - key: DB_HOST
        sync: false   # à renseigner manuellement dans le dashboard Render
      - key: DB_PORT
        value: "5432"

  # ── Frontend Static Site ────────────────────────────
  - type: web
    name: gestion-etudiants-front
    runtime: static
    staticPublishPath: ./frontend
    buildCommand: ""   # aucun build nécessaire (HTML/CSS/JS pur)
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
