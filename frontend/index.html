<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GestEtu — Gestion des Étudiants</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family:'Outfit',sans-serif;
  background:#0f1b2d;
  color:#fff;
}

/* HERO */
#hero {
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  height:100vh;
}

.hero-title {
  font-size:40px;
  color:#e8c76a;
}

#hero-text {
  margin:20px auto;
  max-width:600px;
  color:#aaa;
  min-height:60px;
}

button {
  padding:10px 20px;
  background:#c9a84c;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<section id="hero">
  <div>
    <h1 class="hero-title">GestÉtu</h1>
    <p id="hero-text"></p>
    <button onclick="startApp()">🚀 Lancer l'application</button>
  </div>
</section>

<section id="app" style="display:none; padding:20px;">
  <h2>Bienvenue dans ton application 🎉</h2>
  <p>Ton dashboard va apparaître ici...</p>
</section>

<script>

/* TEXTE ANIMÉ */
const text = "Ce site vise à collecter les informations des étudiants et les trier par unité d'enseignement et par sexe. Ainsi, nous pourrons connaître les étudiants qui suivent une UE et les dénombrer... Lancez-vous !";

let i = 0;
function typeWriter(){
  if(i < text.length){
    document.getElementById("hero-text").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter,25);
  }
}

window.onload = typeWriter;

/* BOUTON */
function startApp(){
  document.getElementById("hero").style.display="none";
  document.getElementById("app").style.display="block";
}

</script>

</body>
</html>
